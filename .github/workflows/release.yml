name: Build & Release

on:
  push:
    branches:
      - "main"
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  quality_gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  build_android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: quality_gate
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Install dependencies
        run: flutter pub get
        
      - name: Build APKs
        run: flutter build apk --release --split-per-abi
        
      - name: Rename APKs
        run: |
          mv build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk chain_reaction_android_arm.apk
          mv build/app/outputs/flutter-apk/app-arm64-v8a-release.apk chain_reaction_android_arm64.apk
          mv build/app/outputs/flutter-apk/app-x86_64-release.apk chain_reaction_android_x64.apk
        
      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: chain_reaction_android_apks
          path: |
            chain_reaction_android_arm.apk
            chain_reaction_android_arm64.apk
            chain_reaction_android_x64.apk

  build_windows:
    name: Build Windows
    runs-on: windows-latest
    needs: quality_gate
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop
        
      - name: Install dependencies
        run: flutter pub get
        
      - name: Build Windows
        run: flutter build windows --release
        
      - name: Compress Windows Build
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath chain_reaction_windows.zip
        
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: chain_reaction_windows
          path: chain_reaction_windows.zip

  release:
    name: Create Release
    needs: [build_android, build_windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        
      - name: Display structure of downloaded files
        run: ls -R
        
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          files: |
            chain_reaction_android_apks/*.apk
            chain_reaction_windows/chain_reaction_windows.zip
          generate_release_notes: true
